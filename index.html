<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FHI Framework</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg-dark: #0A0A0C;
    --accent: #D4F870;
    --text-main: #FFFFFF;
    --text-muted: #8A8D98;
    --text-dim: #3A3D45;
    --border-color: #2A2C35;
  }

  body {
    background-color: #050505;
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 40px 20px;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
  }

  .app-container {
    background-color: var(--bg-dark);
    width: 100%;
    max-width: 650px; /* Slightly wider to comfortably fit data tables */
    padding: 40px;
    border: 1px solid var(--border-color);
    border-radius: 16px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.75);
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border-color);
  }

  .logo {
    background-color: var(--accent);
    color: var(--bg-dark);
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 600;
    font-size: 1.25rem;
    font-family: 'Playfair Display', serif;
  }

  .title-group h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    margin: 0 0 4px 0;
    font-weight: 600;
  }

  .title-group p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin: 0;
    text-transform: uppercase;
  }

  .input-label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
  }

  input[type="text"] {
    flex-grow: 1;
    background-color: #121214;
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  button {
    background-color: var(--accent);
    color: var(--bg-dark);
    border: none;
    padding: 0 24px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover { background-color: #bde058; }
  button:disabled { background-color: var(--text-dim); cursor: not-allowed; }

  /* Loader Terminal */
  .loader-zone {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border-color);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 24px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-log {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Output Rendering Styles */
  .output-zone {
    border-top: 1px solid var(--border-color);
    padding-top: 30px;
    display: none;
  }

  .output-zone h3, .output-zone h2, .output-zone h1 {
    font-family: 'Playfair Display', serif;
    color: var(--accent);
    margin-top: 24px;
  }

  .output-zone p, .output-zone li {
    color: #E2E4E9;
    line-height: 1.6;
    font-size: 0.95rem;
  }

  /* Table Customization for Markdown */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 0.9rem;
  }

  th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid var(--border-color);
  }

  th {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="app-container">
  <header>
    <div class="logo">F</div>
    <div class="title-group">
      <h1>FHI Framework</h1>
      <p>Financial Health Investment</p>
    </div>
  </header>

  <div class="input-label">Company Analysis Terminal</div>
  <div class="input-row">
    <input type="text" id="companyInput" placeholder="e.g. Apple, Nvidia, Tsmt..." spellcheck="false">
    <button id="analyzeBtn" onclick="runAnalysis()">Analyze →</button>
  </div>

  <div class="loader-zone" id="loaderZone">
    <div class="spinner"></div>
    <div class="status-log">Executing pipeline & calculating metrics...</div>
  </div>

  <div class="output-zone" id="outputZone"></div>
</div>

<script>
  async function runAnalysis() {
    const companyInput = document.getElementById('companyInput').value.trim();
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loaderZone = document.getElementById('loaderZone');
    const outputZone = document.getElementById('outputZone');

    if (!companyInput) return alert('Please input a company name first.');

    // UI state adjustments
    analyzeBtn.disabled = true;
    outputZone.style.display = 'none';
    loaderZone.style.display = 'flex';

    try {
      const response = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company: companyInput })
      });

      const data = await response.json();
      
      if (data.error) throw new Error(data.error);

      // Render markdown response safely using marked framework
      outputZone.innerHTML = marked.parse(data.analysis);
      outputZone.style.display = 'block';
    } catch (err) {
      alert(err.message || 'An error occurred during verification processing.');
    } finally {
      analyzeBtn.disabled = false;
      loaderZone.style.display = 'none';
    }
  }
</script>
</body>
</html>
