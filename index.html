<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FHI Framework - Redesign</title>
<style>
  /* Import Google Fonts */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg-dark: #0A0A0C;
    --bg-card: #121214;
    --accent: #D4F870;
    --accent-hover: #bde058;
    --text-main: #FFFFFF;
    --text-muted: #8A8D98;
    --text-dim: #3A3D45;
    --border-color: #2A2C35;
  }

  body {
    background-color: #050505; /* Slightly darker body to make the card pop */
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  .app-container {
    background-color: var(--bg-dark);
    width: 100%;
    max-width: 420px;
    padding: 40px;
    border: 1px solid var(--border-color);
    border-radius: 16px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.75);
  }

  /* --- Header --- */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border-color);
  }

  .logo {
    background-color: var(--accent);
    color: var(--bg-dark);
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 600;
    font-size: 1.25rem;
    font-family: 'Playfair Display', serif;
  }

  .title-group h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    margin: 0 0 4px 0;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .title-group p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin: 0;
    text-transform: uppercase;
  }

  /* --- Input Section --- */
  .input-section {
    margin-bottom: 56px;
  }

  .input-label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .input-row {
    display: flex;
    gap: 12px;
  }

  input[type="text"] {
    flex-grow: 1;
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 1rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: all 0.2s ease;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  button {
    background-color: var(--accent);
    color: var(--bg-dark);
    border: none;
    padding: 0 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
  }

  button:hover {
    background-color: var(--accent-hover);
    transform: translateY(-1px);
  }

  button:active {
    transform: translateY(1px);
  }

  /* --- Progress Section --- */
  .progress-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 2px solid var(--border-color);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
    margin-bottom: 32px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .status-list {
    list-style: none;
    padding: 0;
    margin: 0;
    width: 100%;
    max-width: 300px; /* Constrain width to stagger the text nicely */
  }

  .status-list li {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: color 0.3s ease;
  }

  /* States */
  .status-list .done { color: var(--accent); }
  .status-list .active { color: var(--text-main); animation: pulse 2s infinite; }
  .status-list .pending { color: var(--text-dim); }

  /* Indentation to mimic the original image */
  .status-list li:nth-child(2) { margin-left: 16px; }
  .status-list li:nth-child(3) { margin-left: 32px; }
  .status-list li:nth-child(4) { margin-left: 32px; }
  .status-list li:nth-child(5) { margin-left: 32px; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

</style>
</head>
<body>

<div class="app-container">
  
  <header>
    <div class="logo">F</div>
    <div class="title-group">
      <h1>FHI Framework</h1>
      <p>Financial Health Investment</p>
    </div>
  </header>

  <main>
    <div class="input-section">
      <label class="input-label" for="company">Company Name</label>
      <div class="input-row">
        <input type="text" id="company" value="Tsmc" spellcheck="false" />
        <button>Analyze &rarr;</button>
      </div>
    </div>

    <div class="progress-section">
      <div class="spinner"></div>
      <ul class="status-list">
        <li class="done">✓ Searching financial databases...</li>
        <li class="active">› Parsing income statement...</li>
        <li class="pending">· Analyzing balance sheet...</li>
        <li class="pending">· Computing ratios...</li>
        <li class="pending">· Writing investment memo...</li>
      </ul>
    </div>
  </main>

</div>

</body>
</html>
